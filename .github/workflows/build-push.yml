name: Build and Push

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - master

jobs:
  build-push:
    uses: aserv92/libraries/.github/workflows/docker-build-push.yml@4455094bb3a79c3b208b3a1626bfb319fb31b21f
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
